services:
  back:
    container_name: back
    image: back
    build:
      context: ./back
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    volumes:
      - back_vol:/usr/src/app
      - sqlite_data:/data
    networks:
      - transcendence
    restart: unless-stopped

    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:3000/health"]  
    #   interval: 10s  
    #   timeout: 5s  
    #   retries: 3  
    #   start_period: 5s 

  front:
    container_name: front
    image: front
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - 5173:5173
    # depends_on:
    #   back:
    #     condition: service_healthy
    env_file: ../.env
    volumes: 
      - front_vol:/usr/src/app
    networks:
      - transcendence
    restart: unless-stopped

  nginx:
    container_name: nginx
    image: nginx:latest
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs
    # depends_on:
    #   back:
    #     condition: service_healthy
    networks:
      - transcendence
    restart: unless-stopped

networks:
  transcendence:
    driver: bridge
    name: transcendence

volumes:
  back_vol: {}
  front_vol: {}
  sqlite_data: {}